<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veltonics India · Precision Industrial Automation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VELTONICS — WORLD CLASS REDESIGN (LIGHT THEME)
   Aesthetic: Clean Industrial · Precision Engineering · Premium
   ============================================================ */

:root {
  /* Core palette */
  --bg-main:      #F8FAFC;
  --surface:      #FFFFFF;
  --surface-alt:  #F1F5F9;
  --border:       #E2E8F0;
  --border-md:    #CBD5E1;
  --border-hi:    #94A3B8;

  /* Accents */
  --fire:         #FF6B1A;
  --fire-glow:    rgba(255, 107, 26, 0.15);
  --fire-10:      rgba(255, 107, 26, 0.08);
  --fire-30:      rgba(255, 107, 26, 0.2);
  --blue-deep:    #0F172A; 
  --blue-soft:    rgba(15, 23, 42, 0.04);

  /* Text */
  --t-900:        #020617; /* Pure dark */
  --t-700:        #334155; /* Muted text */
  --t-500:        #64748b; /* Subtitles */
  --t-300:        #94a3b8; /* Placeholders */

  /* Utility */
  --live:         #10B981;
  --wa-green:     #25D366;

  /* Premium Shadows */
  --s-sm:  0 2px 8px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.02);
  --s-md:  0 10px 30px rgba(15, 23, 42, 0.06), 0 4px 12px rgba(15, 23, 42, 0.03);
  --s-lg:  0 24px 60px rgba(15, 23, 42, 0.08), 0 8px 24px rgba(15, 23, 42, 0.04);
  --s-fire: 0 10px 40px rgba(255, 107, 26, 0.2);

  --radius:    12px;
  --radius-lg: 20px;
  --radius-xl: 32px;

  /* Silky Smooth Easing */
  --ease:        cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-expo:   cubic-bezier(0.16, 1, 0.3, 1);
}

/* ---- RESET & BASE ---- */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; overflow-x: hidden; }
body {
  background:var(--bg-main); color:var(--t-700);
  font-family:'Inter', sans-serif;
  overflow-x:hidden; -webkit-font-smoothing:antialiased;
  width: 100%;
}
img,svg { display:block; max-width:100%; height: auto; }
a { text-decoration:none; }
button { font-family:inherit; cursor:pointer; }
h1, h2, h3, h4 { font-family:'Syne', sans-serif; color: var(--t-900); }

/* ---- CUSTOM CURSOR (Desktop Only) ---- */
@media (pointer:fine) {
  * { cursor:none !important; }
  #cursor { position:fixed; z-index:99999; pointer-events:none; }
  #cursor-outer {
    width:40px; height:40px; border:2px solid var(--fire);
    border-radius:50%; position:absolute; top:-20px; left:-20px;
    transition:transform 0.1s var(--ease), border-color 0.2s, width 0.3s var(--ease-spring), height 0.3s var(--ease-spring), opacity 0.2s;
    opacity:0.9;
    background: rgba(255, 107, 26, 0.12);
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }
  #cursor-inner {
    width:10px; height:10px; background:var(--blue-deep);
    border: 2px solid #ffffff;
    border-radius:50%; position:absolute; top:-5px; left:-5px;
    transition:transform 0.05s, background 0.2s;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
  }
  #cursor.hovered #cursor-outer {
    width:64px; height:64px; top:-32px; left:-32px;
    border-color:var(--blue-deep); opacity:0.6;
    background: rgba(15, 23, 42, 0.06);
  }
  #cursor.clicking #cursor-inner { transform:scale(2); background:var(--fire); }
}
@media (pointer:coarse) { #cursor { display:none !important; } }

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg-main); }
::-webkit-scrollbar-thumb { background:var(--border-md); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:var(--fire); }

/* ---- GRAIN OVERLAY ---- */
body::before {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
  mix-blend-mode:multiply;
}

#progress {
  position:fixed; top:0; left:0; height:4px; z-index:9999;
  background:linear-gradient(90deg, var(--fire), #FFAA44);
  box-shadow:0 2px 10px var(--fire-glow); transition:width 0.1s linear; width:0;
}

/* ============================================================
   TOPBAR
   ============================================================ */
#topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0.5rem 0; position:relative; z-index:200; }
.tb-inner { max-width:1440px; margin:0 auto; padding:0 5%; display:flex; justify-content:space-between; align-items:center; }
.tb-left { display:flex; align-items:center; gap:0.75rem; font-family:'JetBrains Mono',monospace; font-size:0.65rem; letter-spacing:0.06em; color:var(--t-500); text-transform:uppercase; }
.tb-pulse { width:6px; height:6px; background:var(--live); border-radius:50%; animation:livePulse 2s infinite; }
@keyframes livePulse { 0% { box-shadow:0 0 0 0 rgba(16,185,129,0.4); } 70% { box-shadow:0 0 0 8px rgba(16,185,129,0); } 100% { box-shadow:0 0 0 0 rgba(16,185,129,0); } }
.tb-right { display:flex; gap:2.5rem; }
.tb-right a { font-family:'JetBrains Mono',monospace; font-size:0.65rem; letter-spacing:0.04em; color:var(--t-700); display:flex; align-items:center; gap:0.5rem; transition:color 0.2s; }
.tb-right a:hover { color:var(--fire); }

/* ============================================================
   NAV
   ============================================================ */
#nav {
  position:sticky; top:0; z-index:150; background:rgba(255, 255, 255, 0.75);
  backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid transparent; transition:all 0.4s var(--ease);
}
#nav.scrolled { border-color:var(--border); box-shadow:var(--s-sm); background:rgba(255, 255, 255, 0.95); }
.nav-inner { max-width:1440px; margin:0 auto; padding:0 5%; display:flex; justify-content:space-between; align-items:center; height:80px; transition:height 0.4s var(--ease); }
#nav.scrolled .nav-inner { height:65px; }

.logo { display:flex; align-items:center; gap:0; flex-shrink:0; }
.logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.2rem, 2vw, 1.5rem); color:var(--t-900); letter-spacing:0.05em; line-height:1; }
.logo-dot { width:8px; height:8px; background:var(--fire); border-radius:50%; margin-left:4px; margin-bottom:2px; flex-shrink:0; box-shadow:0 0 12px var(--fire-glow); }

.nav-links { display:flex; gap:0.5rem; list-style:none; align-items:center; }
.nav-links a {
  color:var(--t-700); font-size:0.875rem; font-weight:500; padding:0.5rem 1.2rem; border-radius:50px;
  transition:all 0.3s var(--ease);
}
.nav-links a:hover { color:var(--t-900); background:var(--surface-alt); }
.nav-links a.active { color:var(--fire); font-weight:600; background:var(--fire-10); }

.nav-cta {
  background:var(--blue-deep) !important; color:var(--surface) !important; font-weight:500 !important;
  border-radius:50px; padding:0.6rem 1.5rem !important; transition:transform 0.3s var(--ease-spring), box-shadow 0.3s !important;
  box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
}
.nav-cta:hover { transform:translateY(-2px) scale(1.02) !important; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2) !important; }

/* Mobile Menu */
.ham { display:none; flex-direction:column; gap:5px; background:none; border:none; padding:4px; z-index: 151; }
.ham span { display:block; width:24px; height:2px; background:var(--t-900); border-radius:2px; transition:all 0.4s var(--ease); }
.ham.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
.ham.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
.ham.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

.mob-menu {
  position:fixed; inset:0; z-index:140; background:rgba(255,255,255,0.98); backdrop-filter:blur(15px);
  display:flex; flex-direction:column; justify-content:center; padding:3rem 10%;
  transform:translateX(100%); transition:transform 0.6s var(--ease-expo);
}
.mob-menu.open { transform:translateX(0); }
.mob-menu a {
  font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2.5rem, 8vw, 4rem);
  color:var(--t-900); letter-spacing:-0.02em; line-height:1.2; padding:1rem 0; border-bottom:1px solid var(--border);
  transition:all 0.3s var(--ease); opacity: 0; transform: translateY(20px);
}
.mob-menu.open a { opacity: 1; transform: translateY(0); }
.mob-menu.open a:nth-child(1) { transition-delay: 0.1s; }
.mob-menu.open a:nth-child(2) { transition-delay: 0.15s; }
.mob-menu.open a:nth-child(3) { transition-delay: 0.2s; }
.mob-menu.open a:nth-child(4) { transition-delay: 0.25s; }
.mob-menu.open a:nth-child(5) { transition-delay: 0.3s; }
.mob-menu.open a:nth-child(6) { transition-delay: 0.35s; }
.mob-menu a:hover { color:var(--fire); padding-left:1rem; }

/* ============================================================
   CONTAINER & UTILS
   ============================================================ */
.wrap { max-width:1440px; margin:0 auto; padding:0 5%; position:relative; z-index:2; width: 100%; }
.section { padding:clamp(4rem, 8vw, 8rem) 0; }

.tag {
  display:inline-flex; align-items:center; gap:0.6rem;
  font-family:'JetBrains Mono',monospace; font-size:0.65rem; font-weight:600;
  letter-spacing:0.15em; text-transform:uppercase; color:var(--fire); margin-bottom:1.5rem;
}
.tag::before { content:''; width:24px; height:2px; background:var(--fire); }
h2.section-title {
  font-size:clamp(2.5rem, 5vw, 4.5rem); line-height:1; letter-spacing:-0.03em; color:var(--t-900); margin-bottom:1.5rem;
}
h2.section-title .serif { font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; color:var(--t-500); letter-spacing:0; }

/* ============================================================
   HERO
   ============================================================ */
#hero {
  position:relative; min-height:max(90svh, 600px); display:flex; align-items:center;
  overflow:hidden; padding:4rem 0; background:var(--bg-main);
}
#hero::before {
  content:''; position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 80% at 85% 10%, rgba(255,107,26,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 10% 90%, rgba(37,99,235,0.04) 0%, transparent 60%);
}
#hero-canvas { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.8; }

.hero-wrap {
  display:grid; grid-template-columns:1fr 1fr; gap:2rem; align-items:center; width:100%;
}
.hero-content { position: relative; z-index: 10; }

.hero-label {
  display:inline-flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem;
  opacity:0; animation:fadeUp 0.8s var(--ease-expo) 0.1s forwards;
}
.hero-label-line { width:40px; height:1px; background:var(--fire); }
.hero-label-text { font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--fire); font-weight:600; }

.hero-title {
  font-size:clamp(3rem, 6.5vw, 6.8rem); line-height:0.95; letter-spacing:-0.03em; color:var(--t-900); margin-bottom:1.5rem;
  opacity:0; animation:fadeUp 0.9s var(--ease-expo) 0.2s forwards;
}
.hero-title .serif { font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; color:var(--fire); letter-spacing:0; }
.hero-title .dim { color:var(--t-500); }

.hero-desc {
  font-size:clamp(1rem, 1.2vw, 1.1rem); line-height:1.7; color:var(--t-700); max-width:480px; margin-bottom:3rem; font-weight:400;
  opacity:0; animation:fadeUp 0.9s var(--ease-expo) 0.3s forwards;
}

.hero-actions {
  display:flex; gap:1rem; flex-wrap:wrap; opacity:0; animation:fadeUp 0.9s var(--ease-expo) 0.4s forwards; margin-bottom:4rem;
}

.btn {
  display:inline-flex; align-items:center; justify-content: center; gap:0.6rem;
  padding:1rem 2rem; border-radius:50px; font-weight:600; font-size:0.95rem; border:none;
  transition:all 0.3s var(--ease-spring); position:relative; overflow:hidden;
}
.btn-fire { background:var(--fire); color:var(--surface); box-shadow:var(--s-fire); }
.btn-fire:hover { transform:translateY(-4px); box-shadow:0 15px 40px rgba(255, 107, 26, 0.3); }
.btn-ghost { background:var(--surface); color:var(--t-900); border:1px solid var(--border-md); box-shadow:var(--s-sm); }
.btn-ghost:hover { background:var(--surface-alt); border-color:var(--t-900); transform:translateY(-4px); box-shadow:var(--s-md); }
.btn-wa { background:var(--wa-green); color:#fff; box-shadow:0 8px 24px rgba(37,211,102,0.25); }
.btn-wa:hover { transform:translateY(-4px); box-shadow:0 15px 40px rgba(37,211,102,0.4); }

.hero-stats {
  display:flex; gap:clamp(1.5rem, 3vw, 3.5rem); border-top:1px solid var(--border); padding-top:2rem;
  opacity:0; animation:fadeUp 0.9s var(--ease-expo) 0.5s forwards; flex-wrap:wrap;
}
.stat-num { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2rem, 3vw, 2.6rem); line-height:1; color:var(--t-900); }
.stat-fire { color:var(--fire); }
.stat-label { font-family:'JetBrains Mono',monospace; font-size:0.65rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--t-500); margin-top:0.5rem; }

/* ---- HERO RIGHT: Advanced Premium UI & Animations ---- */
.hero-viz-container {
  position:relative; width:100%; height:100%; min-height: 500px;
  display:flex; align-items:center; justify-content:center;
  opacity:0; animation:fadeIn 1.2s var(--ease-expo) 0.3s forwards;
}

/* Scaler allows complex absolute positioning without breaking mobile layout */
.hero-viz-scaler {
  position:relative; width: 600px; height: 600px;
  transform-origin: center; transition: transform 0.3s var(--ease);
}

/* Subtle Grid Background matching the image */
.viz-grid {
  position:absolute; inset:-100px; z-index:1;
  background-image:
    linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: center;
  border-radius: 50%;
  mask-image: radial-gradient(circle at center, black 40%, transparent 70%);
  -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 70%);
}

/* Floating Dots in background */
.viz-dot {
  position:absolute; width:4px; height:4px; background:var(--border-hi); border-radius:50%; z-index:2;
  opacity:0.6; animation: floatNode 8s ease-in-out infinite;
}

/* Concentric Orbit Rings */
.orbit-ring {
  position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
  border-radius:50%; pointer-events:none; z-index:3;
}
.orbit-1 { width:340px; height:340px; border:1px solid rgba(15, 23, 42, 0.08); }
.orbit-2 { width:460px; height:460px; border:1px dashed rgba(15, 23, 42, 0.05); }
.orbit-3 { width:580px; height:580px; border:1px solid rgba(15, 23, 42, 0.03); }

/* Central Orb */
.center-orb {
  position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
  width:280px; height:280px; border-radius:50%;
  background:linear-gradient(145deg, #1e293b, #0f172a);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow: 0 40px 80px rgba(15, 23, 42, 0.35), inset 0 2px 10px rgba(255,255,255,0.1);
  z-index:10; animation: floatCenter 10s ease-in-out infinite;
}
@keyframes floatCenter {
  0%, 100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, -55%); }
}

.center-gear { color:var(--fire); width:52px; height:52px; margin-bottom:14px; filter:drop-shadow(0 4px 8px rgba(255,107,26,0.3)); }
.orb-sub { font-family:'JetBrains Mono',monospace; font-size:0.65rem; font-weight:600; letter-spacing:0.15em; color:var(--t-300); margin-bottom:6px; text-transform:uppercase; }
.orb-title { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:#ffffff; letter-spacing:0.05em; text-transform:uppercase; width:100%; text-align:center; }

/* Floating Satellite Nodes (Pills & Icons) */
.node-pill, .node-icon {
  position:absolute; background:var(--surface);
  box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08), 0 5px 15px rgba(0,0,0,0.03);
  border: 1px solid rgba(255,255,255,0.8);
  z-index:20; transition: transform 0.3s var(--ease-spring);
  animation: floatNode 6s ease-in-out infinite; cursor: default;
}
.node-pill:hover, .node-icon:hover { transform:scale(1.08) !important; z-index:25; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12); border-color: var(--border); }

.node-pill {
  padding:0.8rem 1.6rem; border-radius:50px;
  font-family:'JetBrains Mono',monospace; font-size:0.75rem; font-weight:600; color:var(--t-900);
  display:flex; align-items:center; gap:0.6rem; white-space:nowrap;
}
.node-icon {
  width:56px; height:56px; border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem;
}

@keyframes floatNode {
  0%, 100% { transform:translateY(0); }
  50% { transform:translateY(-12px); }
}

/* Specific Node Placements mapping to the image */
.n1 { top:3%; left:15%; animation-delay: 0s; }
.n2 { top:15%; left:22%; animation-delay: -1s; }
.n3 { top:40%; left:0%; animation-delay: -2s; }
.n4 { top:55%; left:18%; animation-delay: -3s; }
.n5 { bottom:15%; left:12%; animation-delay: -4s; }
.n6 { top:8%; right:5%; animation-delay: -1.5s; }
.n7 { top:45%; right:15%; animation-delay: -2.5s; }
.n8 { bottom:28%; right:28%; animation-delay: -3.5s; }
.n9 { bottom:10%; right:10%; animation-delay: -4.5s; }

/* ============================================================
   MARQUEE
   ============================================================ */
.marquee-section { overflow:hidden; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface); padding:1.5rem 0; position:relative; z-index:5; }
.marquee-track { display:flex; gap:0; width:max-content; animation:marquee 35s linear infinite; }
.marquee-track:hover { animation-play-state:paused; }
.marquee-item { display:flex; align-items:center; gap:1.8rem; padding:0 2rem; font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--t-500); white-space:nowrap; transition:color 0.2s; }
.marquee-item:hover { color:var(--fire); }
.marquee-dot { width:5px; height:5px; background:var(--fire); border-radius:50%; opacity:0.8; }
@keyframes marquee { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }

/* ============================================================
   ABOUT SECTION
   ============================================================ */
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:clamp(3rem, 6vw, 6rem); align-items:center; }

.about-main-card {
  position:relative; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl);
  padding:clamp(2rem, 5vw, 4rem); overflow:hidden; box-shadow:var(--s-lg);
  transition: transform 0.5s var(--ease-expo);
}
.about-main-card:hover { transform: translateY(-5px); }
.about-main-card::before {
  content:''; position:absolute; top:-100px; right:-100px; width:400px; height:400px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,107,26,0.06), transparent 60%); pointer-events:none;
}
.about-main-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2.5rem, 4vw, 3.5rem); color:var(--t-900); letter-spacing:-0.02em; line-height:1; margin-bottom:1rem; }
.about-main-sub { font-size:clamp(1rem, 1.2vw, 1.05rem); color:var(--t-700); line-height:1.7; margin-bottom:2.5rem; }

.about-chips { display:flex; flex-wrap:wrap; gap:0.6rem; }
.c
